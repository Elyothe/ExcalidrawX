name: opencode-pr-review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  review:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read
      pull-requests: write
      issues: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Review PR with OpenCode
        uses: anomalyco/opencode/github@latest  
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        with:
          model: opencode/deepseek-v4-flash-free
          use_github_token: true
          prompt: |
            Réponds en français. Review this pull request. Do NOT modify any code.

            Pour chaque fichier modifié, poste des commentaires directement sur les lignes de code concernées (inline review comments), organisés par rubrique :

            ## Bugs
            Signale chaque bug sur la ligne exacte où il se trouve.

            ## Sécurité
            Signale chaque faille de sécurité sur la ligne concernée.

            ## Qualité de code / Conventions Dart/Flutter
            Signale les problèmes de style, conventions, const manquants, sur les lignes correspondantes.

            ## Architecture
            Signale les problèmes de séparation des couches (UI/logique mélangée, dépendances incorrectes) sur les lignes concernées.

            ## Résumé
            Un commentaire global en fin de review avec un résumé des points critiques.
