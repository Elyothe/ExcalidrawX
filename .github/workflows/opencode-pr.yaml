name: opencode-pr-review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  review:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read
      pull-requests: write
      issues: read
      

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Review PR with OpenCode
        uses: anomalyco/opencode/github@latest  
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        with:
          model: opencode/deepseek-v4-flash-free
          use_github_token: true
          prompt: |
            Review this pull request. Do NOT modify any code.
            1. Read the git diff
            2. Check for bugs, type safety, and null safety issues
            3. Check for security issues
            4. Check adherence to Dart/Flutter conventions
            5. Post a review comment summarizing your findings
