name: opencode-pr-review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  opencode:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get opencode version
        id: version
        shell: bash
        run: |
          latest=$(curl -sf https://api.github.com/repos/anomalyco/opencode/releases/latest)
          version=$(echo "$latest" | grep -o '"tag_name": *"[^"]*"' | cut -d'"' -f4)
          echo "version=${version:-latest}" >> $GITHUB_OUTPUT

      - name: Cache opencode
        id: cache
        uses: actions/cache@v4
        with:
          path: ~/.opencode/bin
          key: opencode-${{ runner.os }}-${{ runner.arch }}-${{ steps.version.outputs.version }}

      - name: Install opencode
        if: steps.cache.outputs.cache-hit != 'true'
        shell: bash
        run: curl -fsSL https://opencode.ai/install | bash

      - name: Add opencode to PATH
        shell: bash
        run: echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Configure OpenCode Zen
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        shell: bash
        run: |
          mkdir -p ~/.config/opencode

          cat > ~/.config/opencode/opencode.json << EOF
          {
            "\$schema": "https://opencode.ai/config.json",
            "provider": {
              "opencode": {
                "npm": "@ai-sdk/openai-compatible",
                "options": {
                  "baseURL": "https://opencode.ai/zen/v1/chat/completions",
                  "apiKey": "${OPENCODE_API_KEY}"
                },
                "models": {
                  "minimax-m2.7": {
                    "name": "minimax-m2.7"
                  }
                }
              }
            },
            "model": "minimax-m2.7"
          }
          EOF

      - name: Review PR with opencode
        run: |
          opencode run \
            --print-logs \
            -m minimax-m2.7 \
            "Review this pull request changes:
            1. Read the git diff
            2. Check for bugs
            3. Check security issues
            4. Check code quality
            5. Post a review comment on the PR"
